<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <img id="google-image" src="google_icon.jpg" alt="Google icon">
    </head>
    <style>
        #link {
            text-align: right;
            font-size: 20px;
        }
        input[type=text] {
            position: absolute;
            top: 350px;
            left: 375px;
            width: 580px;
            height: 30px;
            border: 1px solid blue;
            border-radius: 25px;
            padding: 12px 20px;
        }
        #search_button {
            position: absolute;
            padding: 8px;
            border-radius: 20px;
            top: 420px;
            left: 475px;
        }
        #google-image {
            position: absolute;
            width: 300px;
            top: 175px;
            left: 510px;
        }
        .button {
            font-size: 20px;
            margin: 4px;
        }
    </style>
    <body>
        <form action="https://www.google.com/search">
            <input type="text" name="q" autocomplete="off">
            <div id="search_button">
                <input class="button" type="submit" value="Google Search">
                <input class="button" type="submit" name="btnI" value="I'm Feeling Lucky" class="button">
            </div>
        </form>


        <div id="link">
            <form action="image.html">
                <button class="button">Google Image Search</button>
            </form>
            <form action="advanced.html">
                <button class="button">Google Advanced Search</button>
            </form>
        </div>

    </body>
