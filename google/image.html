<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
    </head>
    <style>
        #link {
            text-align: right;
            font-size: 20px;
        }
        input[type=text] {
            position: absolute;
            top: 350px;
            left: 375px;
            width: 580px;
            height: 30px;
            border: 1px solid blue;
            border-radius: 25px;
            padding: 12px 20px;
        }
        #search_button {
            position: absolute;
            padding: 8px;
            top: 420px;
            left: 550px;
        }
        .button {
            font-size: 20px;
        }
        #title {
            font-size: 60px;
            position: absolute;
            top: 200px;
            left: 425px;
        }
    </style>
    <body>
        <div id="title">Google Image Search</div>
        <form action="http://images.google.com/images">
            <input type="text" name="q" autocomplete="off">
            <div id="search_button">
                <input class="button" type="submit" value="Google Image Search">
            </div>
        </form>

        <div id="link">
            <form action="index.html">
                <button class="button">Google Search</button>
            </form>
        </div>

    </body>
